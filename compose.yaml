services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: seqr-backend
    environment:
      - MASTER_API_KEY=${MASTER_API_KEY}
    expose:
      - "8080"
    networks:
      - app-network

  seqr-nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - CLIENT_API_KEY=${CLIENT_API_KEY}
    container_name: nginx-proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge