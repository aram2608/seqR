services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seqr-frontend
    expose:
      - "3000"
    networks:
      - app-network

  backend:
    build: 
      context: ./r-api
      dockerfile: Dockerfile
    container_name: seqr-backend
    expose:
      - "8080"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge